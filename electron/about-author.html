<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>O autorze — BitResume</title>
  <style>
    :root {
      color-scheme: light dark;
      --fg: #0f172a;
      --muted: #475569;
      --border: #e2e8f0;
      --accent: #1e3a8a;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #f1f5f9;
        --muted: #94a3b8;
        --border: #334155;
        --accent: #93c5fd;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 1.75rem;
      font: 15px/1.55 system-ui, "Segoe UI", Roboto, sans-serif;
      color: var(--fg);
      max-width: 28rem;
    }
    h1 { font-size: 1.2rem; margin: 0 0 0.5rem; }
    p { margin: 0.65rem 0; color: var(--muted); }
    .name { font-size: 1.1rem; font-weight: 600; color: var(--fg); margin-bottom: 1rem; }
    a {
      display: inline-block;
      color: var(--accent);
      margin: 0.35rem 0;
      word-break: break-all;
    }
    hr { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }
  </style>
</head>
<body>
  <h1>O autorze</h1>
  <p class="name">Mateusz Starakiewicz</p>
  <p>Autor aplikacji BitResume. Poniżej profile społecznościowe:</p>
  <hr />
  <p><strong>LinkedIn</strong></p>
  <a href="https://linkedin.com/in/mateusz-starakiewicz-207600132">linkedin.com/in/mateusz-starakiewicz-207600132</a>
  <p><strong>GitHub</strong></p>
  <a href="https://github.com/MattStarakiewicz">github.com/MattStarakiewicz</a>
</body>
</html>
